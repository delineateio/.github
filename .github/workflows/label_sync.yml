name: "Label Sync"
on:
  push:
    branches:
      - master
    paths:
      - .github/labels.yml
  workflow_dispatch:

jobs:
  label-sync:
    name: Sync labels across org
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          token: ${{ secrets.LABEL_SYNC_TOKEN }}
