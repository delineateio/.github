name: "Welcome"
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  welcome:
    name: Welcome first-time contributors
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/first-interaction@3c71ce730280171fd1cfb57c00c774f8998586f7 # v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! 👋

            Please make sure you've read our [contributing guidelines](../blob/master/CONTRIBUTING.md)
            and [code of conduct](../blob/master/CODE_OF_CONDUCT.md).

            A maintainer will review this shortly.
          pr-message: |
            Thanks for your first pull request! 👋

            Please make sure you've read our [contributing guidelines](../blob/master/CONTRIBUTING.md)
            and that all commits include a [DCO sign-off](../blob/master/cla.txt).

            A maintainer will review this shortly.
