# Canonical label set synced across all delineate.io org repos

# Type
- name: "type: bug"
  color: "d73a4a"
  description: Something isn't working

- name: "type: feature"
  color: "a2eeef"
  description: New feature or request

- name: "type: docs"
  color: "0075ca"
  description: Improvements or additions to documentation

- name: "type: chore"
  color: "e4e669"
  description: Maintenance, dependencies, tooling

- name: "type: security"
  color: "e11d48"
  description: Security related issue or fix

# Status
- name: "status: in-progress"
  color: "fbca04"
  description: Actively being worked on

- name: "status: blocked"
  color: "b60205"
  description: Blocked by another issue or external factor

- name: "status: stale"
  color: "ededed"
  description: No recent activity

- name: "status: needs-review"
  color: "0052cc"
  description: Awaiting review

# Priority
- name: "priority: high"
  color: "b60205"
  description: High priority

- name: "priority: medium"
  color: "fbca04"
  description: Medium priority

- name: "priority: low"
  color: "0e8a16"
  description: Low priority

# Meta
- name: "pinned"
  color: "5319e7"
  description: Pinned — exempt from stale checks

- name: "good first issue"
  color: "7057ff"
  description: Good for newcomers

- name: "help wanted"
  color: "008672"
  description: Extra attention is needed
